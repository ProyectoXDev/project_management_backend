apiVersion: apps/v1
kind: Deployment
metadata:
  name: gravity-backend
  namespace: gravity
  labels:
    app: gravity-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gravity-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gravity-backend
    spec:
      containers:
        - name: backend
          image: gravity-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: gravity-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: gravity-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gravity-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gravity-secrets
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: gravity-secrets
                  key: jwt-refresh-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gravity-backend-svc
  namespace: gravity
spec:
  selector:
    app: gravity-backend
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gravity-frontend
  namespace: gravity
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gravity-frontend
  template:
    metadata:
      labels:
        app: gravity-frontend
    spec:
      containers:
        - name: frontend
          image: gravity-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.gravity.io"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gravity-frontend-svc
  namespace: gravity
spec:
  selector:
    app: gravity-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gravity-ingress
  namespace: gravity
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
    - hosts:
        - app.gravity.io
        - api.gravity.io
      secretName: gravity-tls
  rules:
    - host: app.gravity.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gravity-frontend-svc
                port:
                  number: 3000
    - host: api.gravity.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gravity-backend-svc
                port:
                  number: 3001
