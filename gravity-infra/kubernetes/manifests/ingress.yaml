apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gravity-ingress
  namespace: gravity
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - app.gravity.io
        - api.gravity.io
      secretName: gravity-tls
  rules:
    - host: api.gravity.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gravity-backend
                port:
                  number: 3001
    - host: app.gravity.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gravity-frontend
                port:
                  number: 3000
